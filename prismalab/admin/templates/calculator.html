{% extends "base.html" %}

{% block title %}Калькулятор — PrismaLab Admin{% endblock %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    /* Изоляция: тёмный фон калькулятора не конфликтует с Bootstrap light */
    #calculator-root {
        background: #080e1a;
        border-radius: 16px;
        margin: -30px -30px 0;
        padding: 20px 12px 60px;
    }
    #calculator-root *, #calculator-root *::before, #calculator-root *::after {
        box-sizing: border-box;
    }
    /* Override Bootstrap resets inside calculator */
    #calculator-root table { color: inherit; }
    #calculator-root input[type="number"] { -moz-appearance: textfield; }
    #calculator-root input[type="number"]::-webkit-outer-spin-button,
    #calculator-root input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
</style>
{% endblock %}

{% block content %}
<div id="calculator-root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo, useCallback } = React;

const fmt = (n, d = 1) => Number(n).toFixed(d);
const fmtR = (n) => Math.round(n).toLocaleString("ru-RU");

function Hint({ text }) {
  const [open, setOpen] = useState(false);
  return (
    <span style={{ position: "relative", display: "inline-block", marginLeft: 6 }}>
      <span
        onClick={() => setOpen(!open)}
        style={{
          display: "inline-flex", alignItems: "center", justifyContent: "center",
          width: 18, height: 18, borderRadius: "50%", background: "#2a3a52",
          color: "#7dd3fc", fontSize: 11, fontWeight: 700, cursor: "pointer", userSelect: "none",
        }}
      >?</span>
      {open && (
        <div style={{
          position: "absolute", bottom: 26, left: -80, width: 260,
          background: "#1e293b", border: "1px solid #334155", borderRadius: 10,
          padding: "10px 12px", color: "#cbd5e1", fontSize: 12, lineHeight: 1.5,
          zIndex: 999, boxShadow: "0 8px 30px rgba(0,0,0,0.5)",
        }}>
          {text}
        </div>
      )}
    </span>
  );
}

function NumInput({ value, onChange, width = 70, prefix = "", suffix = "", step = 1, min = 0 }) {
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 2 }}>
      {prefix && <span style={{ color: "#64748b", fontSize: 13 }}>{prefix}</span>}
      <input
        type="number" value={value} step={step} min={min}
        onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
        style={{
          background: "#172033", border: "1px solid #2a3a52", borderRadius: 6,
          padding: "5px 8px", color: "#e2e8f0", fontSize: 14,
          fontFamily: "'IBM Plex Mono', monospace", width, outline: "none", textAlign: "right",
        }}
      />
      {suffix && <span style={{ color: "#64748b", fontSize: 13 }}>{suffix}</span>}
    </span>
  );
}

function MarginBar({ margin }) {
  const c = Math.max(0, Math.min(100, margin));
  const color = margin >= 60 ? "#34d399" : margin >= 40 ? "#fbbf24" : "#f87171";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <div style={{ width: 50, height: 7, background: "#1a2740", borderRadius: 4, overflow: "hidden" }}>
        <div style={{ width: `${c}%`, height: "100%", background: color, borderRadius: 4, transition: "all .3s" }} />
      </div>
      <span style={{ color, fontWeight: 700, fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", minWidth: 44 }}>
        {fmt(margin, 1)}%
      </span>
    </div>
  );
}

function Card({ title, hint, accent = "#38bdf8", children, emoji }) {
  return (
    <div style={{
      background: "linear-gradient(180deg, #0f1a2e 0%, #0c1525 100%)",
      border: "1px solid #1a2740", borderRadius: 16, padding: "22px 20px", marginBottom: 20,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
        {emoji && <span style={{ fontSize: 20 }}>{emoji}</span>}
        <h2 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: accent, fontFamily: "'IBM Plex Mono', monospace" }}>
          {title}
        </h2>
        {hint && <Hint text={hint} />}
      </div>
      {children}
    </div>
  );
}

function THead() {
  return (
    <thead>
      <tr style={{ color: "#4a6080", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", textAlign: "left" }}>
        <th style={{ padding: "6px", borderBottom: "1px solid #1a2740" }}>Кредиты</th>
        <th style={{ padding: "6px", borderBottom: "1px solid #1a2740" }}>Цена</th>
        <th style={{ padding: "6px", borderBottom: "1px solid #1a2740" }}>&#8381;/кр</th>
        <th style={{ padding: "6px", borderBottom: "1px solid #1a2740" }}>Себес</th>
        <th style={{ padding: "6px", borderBottom: "1px solid #1a2740" }}>Профит</th>
        <th style={{ padding: "6px", borderBottom: "1px solid #1a2740" }}>Маржа</th>
        <th style={{ padding: "6px", borderBottom: "1px solid #1a2740" }}></th>
      </tr>
    </thead>
  );
}

function PackageRow({ pkg, onChange, onRemove, costPerCredit }) {
  const perCredit = pkg.credits > 0 ? pkg.price / pkg.credits : 0;
  const totalCost = costPerCredit * pkg.credits;
  const profit = pkg.price - totalCost;
  const margin = pkg.price > 0 ? (profit / pkg.price) * 100 : 0;
  return (
    <tr style={{ color: "#e2e8f0" }}>
      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060" }}>
        <NumInput value={pkg.credits} onChange={(v) => onChange({ ...pkg, credits: v })} width={50} />
      </td>
      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060" }}>
        <NumInput value={pkg.price} onChange={(v) => onChange({ ...pkg, price: v })} width={60} suffix="&#8381;" />
      </td>
      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: "#94a3b8" }}>
        {fmt(perCredit, 1)}&#8381;
      </td>
      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: "#64748b" }}>
        {fmtR(totalCost)}&#8381;
      </td>
      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: profit >= 0 ? "#34d399" : "#f87171" }}>
        {profit >= 0 ? "+" : ""}{fmtR(profit)}&#8381;
      </td>
      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060" }}><MarginBar margin={margin} /></td>
      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060" }}>
        <button onClick={onRemove} style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", fontSize: 18 }}>&times;</button>
      </td>
    </tr>
  );
}

function AddBtn({ onClick }) {
  return (
    <button onClick={onClick} style={{
      background: "#1a2740", border: "1px dashed #2a3a52", borderRadius: 8,
      padding: "6px 14px", color: "#38bdf8", fontSize: 12, fontWeight: 600, cursor: "pointer", marginTop: 8,
    }}>+ пакет</button>
  );
}

const st = {
  label: { color: "#4a6080", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 },
  grid: { display: "flex", gap: 10, flexWrap: "wrap" },
  mini: {
    background: "#0f1a2e", border: "1px solid #1a2740", borderRadius: 10,
    padding: "10px 14px", flex: "1 1 160px", minWidth: 120,
  },
  big: { fontSize: 22, fontWeight: 700, fontFamily: "'IBM Plex Mono', monospace", marginTop: 2 },
  sub: { color: "#3a5070", fontSize: 11, marginTop: 2 },
  note: {
    background: "#0d1625", border: "1px solid #1a274080", borderRadius: 10,
    padding: "12px 14px", margin: "12px 0 0", color: "#7a95b8", fontSize: 12, lineHeight: 1.6,
  },
  tbl: { width: "100%", borderCollapse: "collapse", fontSize: 13 },
};

function App() {
  const [usdRate, setUsdRate] = useState(90);
  const [targetMargin, setTargetMargin] = useState(55);
  const [seedreamUsd, setSeedreamUsd] = useState(0.035);
  const [nanoUsd, setNanoUsd] = useState(0.09);
  const [seedreamRatio, setSeedreamRatio] = useState(70);
  const [trainUsd, setTrainUsd] = useState(1.5);
  const [minSetUsd, setMinSetUsd] = useState(0.22);

  const [expressPkgs, setExpressPkgs] = useState([
    { credits: 5, price: 199 }, { credits: 10, price: 299 }, { credits: 30, price: 699 },
  ]);
  const [personaFirst, setPersonaFirst] = useState([
    { credits: 5, price: 299 }, { credits: 20, price: 599 }, { credits: 40, price: 999 },
  ]);
  const [personaTopup, setPersonaTopup] = useState([
    { credits: 10, price: 229 }, { credits: 20, price: 439 }, { credits: 30, price: 629 },
  ]);
  const [photosets, setPhotosets] = useState([
    { name: "Минимальный", costUsd: 0.22 }, { name: "Средний", costUsd: 1.5 },
    { name: "Большой", costUsd: 3.0 }, { name: "Премиум", costUsd: 5.0 },
  ]);
  const [newSetName, setNewSetName] = useState("");
  const [newSetCost, setNewSetCost] = useState("");
  const [quickCost, setQuickCost] = useState(0.22);

  const expressBlended = useMemo(() => (seedreamUsd * seedreamRatio / 100 + nanoUsd * (1 - seedreamRatio / 100)) * usdRate, [seedreamUsd, nanoUsd, seedreamRatio, usdRate]);
  const worstCase = nanoUsd * usdRate;
  const trainRub = trainUsd * usdRate;
  const minSetRub = minSetUsd * usdRate;

  const avgTopupCredit = useMemo(() => {
    if (!personaTopup.length) return 1;
    const tr = personaTopup.reduce((s, p) => s + p.price, 0);
    const tc = personaTopup.reduce((s, p) => s + p.credits, 0);
    return tc > 0 ? tr / tc : 1;
  }, [personaTopup]);

  const calcCredits = useCallback((costUsd) => {
    const costRub = costUsd * usdRate;
    const needed = costRub / (1 - targetMargin / 100);
    return Math.max(1, Math.ceil(needed / avgTopupCredit));
  }, [usdRate, targetMargin, avgTopupCredit]);

  const upd = (list, setList) => ({
    u: (i, v) => setList(list.map((x, j) => j === i ? v : x)),
    r: (i) => setList(list.filter((_, j) => j !== i)),
    a: () => setList([...list, { credits: 10, price: 299 }]),
  });
  const ex = upd(expressPkgs, setExpressPkgs);
  const pf = upd(personaFirst, setPersonaFirst);
  const pt = upd(personaTopup, setPersonaTopup);

  return (
    <div style={{ fontFamily: "'Nunito Sans', sans-serif", color: "#e2e8f0" }}>
      <div style={{ maxWidth: 820, margin: "0 auto" }}>

        <h1 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 4px", fontFamily: "'IBM Plex Mono', monospace", color: "#38bdf8" }}>
          PrismaLab &middot; Калькулятор
        </h1>
        <p style={{ color: "#3a5070", fontSize: 13, margin: "0 0 24px" }}>Меняй любые числа — всё пересчитается на лету</p>

        {/* GLOBAL */}
        <Card title="Глобальные настройки" emoji="&#9881;" accent="#38bdf8"
          hint="Курс доллара переводит себес в рубли. Целевая маржа — сколько % от цены хочешь оставлять себе.">
          <div style={{ ...st.grid, marginBottom: 14 }}>
            <div style={st.mini}>
              <div style={st.label}>Курс доллара</div>
              <NumInput value={usdRate} onChange={setUsdRate} width={60} suffix="&#8381;" />
            </div>
            <div style={st.mini}>
              <div style={st.label}>Целевая маржа</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <input type="range" min={20} max={90} value={targetMargin} onChange={(e) => setTargetMargin(+e.target.value)} style={{ flex: 1, accentColor: "#38bdf8" }} />
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 700, color: "#38bdf8", fontSize: 15 }}>{targetMargin}%</span>
              </div>
            </div>
          </div>
          <div style={st.note}>
            <strong style={{ color: "#7dd3fc" }}>Что такое маржа?</strong> Если сет стоит 100&#8381; в себесе, а ты продаёшь за 250&#8381;, то маржа = (250-100)/250 = 60%. Это значит 60% от цены — твоя прибыль, 40% уходит на себестоимость.
          </div>
        </Card>

        {/* EXPRESS COST */}
        <Card title="Экспресс — себестоимость фото" emoji="&#9889;" accent="#fbbf24"
          hint="1 кредит = 1 фото. Юзер выбирает модель (Seedream дешевле, Nano дороже). Ползунок — предполагаемая доля каждой модели.">
          <div style={{ ...st.grid, marginBottom: 14 }}>
            <div style={st.mini}>
              <div style={st.label}>Seedream</div>
              <NumInput value={seedreamUsd} onChange={setSeedreamUsd} width={60} prefix="$" step={0.001} />
              <div style={st.sub}>= {fmt(seedreamUsd * usdRate)}&#8381; за фото</div>
            </div>
            <div style={st.mini}>
              <div style={st.label}>Nano Banana</div>
              <NumInput value={nanoUsd} onChange={setNanoUsd} width={60} prefix="$" step={0.001} />
              <div style={st.sub}>= {fmt(nanoUsd * usdRate)}&#8381; за фото</div>
            </div>
          </div>
          <div style={{ ...st.mini, marginBottom: 12 }}>
            <div style={st.label}>Seedream {seedreamRatio}% / Nano {100 - seedreamRatio}%</div>
            <input type="range" min={0} max={100} value={seedreamRatio} onChange={(e) => setSeedreamRatio(+e.target.value)} style={{ width: "100%", accentColor: "#fbbf24" }} />
          </div>
          <div style={st.grid}>
            <div style={{ ...st.mini, borderColor: "#fbbf2440" }}>
              <div style={st.label}>Средняя себес фото</div>
              <div style={{ ...st.big, color: "#fbbf24" }}>{fmt(expressBlended)}&#8381;</div>
            </div>
            <div style={{ ...st.mini, borderColor: "#f8717140" }}>
              <div style={st.label}>Worst case (100% Nano)</div>
              <div style={{ ...st.big, color: "#f87171" }}>{fmt(worstCase)}&#8381;</div>
            </div>
          </div>
          <div style={st.note}>
            <strong style={{ color: "#fde68a" }}>Формула:</strong> Средняя = (Seedream &times; {seedreamRatio}% + Nano &times; {100 - seedreamRatio}%) &times; {usdRate}&#8381; = {fmt(expressBlended)}&#8381;
          </div>
        </Card>

        {/* EXPRESS PACKAGES */}
        <Card title="Экспресс — пакеты кредитов" emoji="&#128230;" accent="#fbbf24"
          hint="Меняй цены и кредиты — маржа пересчитается. Себес пакета = средняя цена фото x кол-во кредитов.">
          <div style={{ overflowX: "auto" }}>
            <table style={st.tbl}><THead /><tbody>
              {expressPkgs.map((p, i) => <PackageRow key={i} pkg={p} costPerCredit={expressBlended} onChange={(v) => ex.u(i, v)} onRemove={() => ex.r(i)} />)}
            </tbody></table>
          </div>
          <AddBtn onClick={ex.a} />
          <div style={st.note}><strong style={{ color: "#fde68a" }}>Как читать:</strong> Себес = {fmt(expressBlended)}&#8381; &times; кредиты. Профит = цена - себес. Маржа = профит / цена.</div>
        </Card>

        {/* PERSONA COST */}
        <Card title="Персона — себестоимость" emoji="&#128100;" accent="#a78bfa"
          hint="Обучение — разовая трата при первой покупке. Мин. фотосет — самая дешёвая генерация, от неё считаем нижнюю границу.">
          <div style={st.grid}>
            <div style={st.mini}>
              <div style={st.label}>Обучение модели</div>
              <NumInput value={trainUsd} onChange={setTrainUsd} width={60} prefix="$" step={0.1} />
              <div style={st.sub}>= {fmtR(trainRub)}&#8381; (один раз)</div>
            </div>
            <div style={st.mini}>
              <div style={st.label}>Мин. фотосет</div>
              <NumInput value={minSetUsd} onChange={setMinSetUsd} width={60} prefix="$" step={0.01} />
              <div style={st.sub}>= {fmt(minSetRub)}&#8381; за генерацию</div>
            </div>
          </div>
          <div style={st.note}><strong style={{ color: "#c4b5fd" }}>Логика:</strong> Первая покупка = обучение + (мин.сет &times; кредиты). Докуп = только мин.сет &times; кредиты. Дорогие сеты списывают больше кредитов — маржа на кредит выше.</div>
        </Card>

        {/* PERSONA FIRST BUY */}
        <Card title="Персона — первая покупка (с обучением)" emoji="&#127891;" accent="#a78bfa"
          hint="Обучение зашито в себес. Чем больше пакет — тем меньше вес обучения на кредит.">
          <div style={{ overflowX: "auto" }}>
            <table style={st.tbl}><THead /><tbody>
              {personaFirst.map((p, i) => {
                const cost = (trainRub + minSetRub * p.credits) / (p.credits || 1);
                return <PackageRow key={i} pkg={p} costPerCredit={cost} onChange={(v) => pf.u(i, v)} onRemove={() => pf.r(i)} />;
              })}
            </tbody></table>
          </div>
          <AddBtn onClick={pf.a} />
          <div style={st.note}><strong style={{ color: "#c4b5fd" }}>Формула:</strong> Себес = {fmtR(trainRub)}&#8381; (обучение) + {fmt(minSetRub)}&#8381; &times; кредиты</div>
        </Card>

        {/* PERSONA TOPUP */}
        <Card title="Персона — докуп кредитов" emoji="&#128260;" accent="#22d3ee"
          hint="Без обучения. Средняя цена кредита отсюда используется для расчёта фотосетов ниже.">
          <div style={{ overflowX: "auto" }}>
            <table style={st.tbl}><THead /><tbody>
              {personaTopup.map((p, i) => <PackageRow key={i} pkg={p} costPerCredit={minSetRub} onChange={(v) => pt.u(i, v)} onRemove={() => pt.r(i)} />)}
            </tbody></table>
          </div>
          <AddBtn onClick={pt.a} />
          <div style={{ ...st.mini, marginTop: 12, borderColor: "#22d3ee40" }}>
            <div style={st.label}>Средняя цена 1 кредита (из докупа)</div>
            <div style={{ ...st.big, color: "#22d3ee" }}>{fmt(avgTopupCredit)}&#8381;</div>
            <div style={st.sub}>Столько реальных рублей юзер платит за 1 кредит в среднем</div>
          </div>
        </Card>

        {/* PHOTOSETS */}
        <Card title="Фотосеты — сколько кредитов ставить" emoji="&#128248;" accent="#f472b6"
          hint="Вбиваешь себес — видишь сколько кредитов назначить при целевой марже.">
          <div style={{ overflowX: "auto" }}>
            <table style={st.tbl}>
              <thead>
                <tr style={{ color: "#4a6080", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", textAlign: "left" }}>
                  <th style={{ padding: 6, borderBottom: "1px solid #1a2740" }}>Сет</th>
                  <th style={{ padding: 6, borderBottom: "1px solid #1a2740" }}>Себес $</th>
                  <th style={{ padding: 6, borderBottom: "1px solid #1a2740" }}>Себес &#8381;</th>
                  <th style={{ padding: 6, borderBottom: "1px solid #1a2740" }}>Кредитов</th>
                  <th style={{ padding: 6, borderBottom: "1px solid #1a2740" }}>Выручка &#8381;</th>
                  <th style={{ padding: 6, borderBottom: "1px solid #1a2740" }}>Маржа</th>
                  <th style={{ padding: 6, borderBottom: "1px solid #1a2740" }}></th>
                </tr>
              </thead>
              <tbody>
                {photosets.map((s, i) => {
                  const costRub = s.costUsd * usdRate;
                  const credits = calcCredits(s.costUsd);
                  const revenue = credits * avgTopupCredit;
                  const margin = revenue > 0 ? ((revenue - costRub) / revenue) * 100 : 0;
                  return (
                    <tr key={i} style={{ color: "#e2e8f0" }}>
                      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060" }}>
                        <input value={s.name} onChange={(e) => { const u = [...photosets]; u[i] = { ...s, name: e.target.value }; setPhotosets(u); }}
                          style={{ background: "transparent", border: "none", color: "#e2e8f0", fontSize: 13, width: 90, outline: "none", borderBottom: "1px dashed #2a3a52", padding: "2px 0" }} />
                      </td>
                      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060" }}>
                        <NumInput value={s.costUsd} onChange={(v) => { const u = [...photosets]; u[i] = { ...s, costUsd: v }; setPhotosets(u); }} width={55} prefix="$" step={0.01} />
                      </td>
                      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: "#64748b" }}>{fmtR(costRub)}&#8381;</td>
                      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060" }}>
                        <span style={{ background: "#a78bfa20", color: "#a78bfa", padding: "3px 10px", borderRadius: 6, fontWeight: 700, fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }}>{credits}</span>
                      </td>
                      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: "#34d399" }}>{fmtR(revenue)}&#8381;</td>
                      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060" }}><MarginBar margin={margin} /></td>
                      <td style={{ padding: "8px 6px", borderBottom: "1px solid #1a274060" }}>
                        <button onClick={() => setPhotosets(photosets.filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", fontSize: 18 }}>&times;</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
            <input value={newSetName} onChange={(e) => setNewSetName(e.target.value)} placeholder="Название"
              style={{ background: "#172033", border: "1px solid #2a3a52", borderRadius: 8, padding: "6px 10px", color: "#e2e8f0", fontSize: 13, flex: "1 1 100px", outline: "none" }} />
            <NumInput value={newSetCost} onChange={(v) => setNewSetCost(v)} width={60} prefix="$" step={0.01} />
            <button onClick={() => {
              const c = parseFloat(newSetCost); if (!newSetName || isNaN(c)) return;
              setPhotosets([...photosets, { name: newSetName, costUsd: c }]); setNewSetName(""); setNewSetCost("");
            }} style={{ background: "#f472b6", border: "none", borderRadius: 8, padding: "6px 14px", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>+ сет</button>
          </div>
          <div style={st.note}>
            <strong style={{ color: "#f9a8d4" }}>Формула:</strong> Себес сета в &#8381; &divide; (1 - маржа {targetMargin}%) = нужная выручка. Нужная выручка &divide; цена кредита ({fmt(avgTopupCredit)}&#8381;) = кол-во кредитов (округляем вверх).
            <br />Пример: сет $5 = {fmtR(5 * usdRate)}&#8381; &rarr; выручка нужна {fmtR(5 * usdRate / (1 - targetMargin / 100))}&#8381; &rarr; {calcCredits(5)} кредитов.
          </div>
        </Card>

        {/* QUICK CONVERTER */}
        <Card title="Быстрый конвертер" emoji="&#128295;" accent="#34d399" hint="Ввёл себес — получил ответ.">
          {(() => {
            const costRub = quickCost * usdRate;
            const credits = calcCredits(quickCost);
            const revenue = credits * avgTopupCredit;
            const margin = revenue > 0 ? ((revenue - costRub) / revenue) * 100 : 0;
            return (
              <>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
                  <span style={{ color: "#94a3b8" }}>Себес сета:</span>
                  <NumInput value={quickCost} onChange={setQuickCost} width={70} prefix="$" step={0.01} />
                  <span style={{ color: "#4a6080" }}>= {fmtR(costRub)}&#8381;</span>
                </div>
                <div style={st.grid}>
                  {[
                    { label: "Назначить", value: credits, unit: "кредитов", color: "#a78bfa" },
                    { label: "Выручка", value: `${fmtR(revenue)}\u20BD`, unit: "за сет", color: "#34d399" },
                    { label: "Маржа", value: `${fmt(margin, 0)}%`, unit: `цель ${targetMargin}%`, color: margin >= targetMargin ? "#34d399" : "#fbbf24" },
                  ].map((m, i) => (
                    <div key={i} style={{ ...st.mini, textAlign: "center", flex: "1 1 100px" }}>
                      <div style={st.label}>{m.label}</div>
                      <div style={{ ...st.big, color: m.color, fontSize: 28 }}>{m.value}</div>
                      <div style={st.sub}>{m.unit}</div>
                    </div>
                  ))}
                </div>
              </>
            );
          })()}
        </Card>

        <div style={{ textAlign: "center", color: "#2a3a52", fontSize: 11, marginTop: 24 }}>
          Все расчёты в реальном времени &middot; $ = {usdRate}&#8381; &middot; маржа {targetMargin}%
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('calculator-root'));
root.render(<App />);
</script>
{% endblock %}
